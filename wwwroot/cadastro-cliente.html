<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="form-container">
        <h2 id="tituloPagina">Novo Cliente</h2>

        <form id="formCliente">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label for="nome">Nome / Razão Social *</label>
                    <input type="text" id="nome" name="nome" required maxlength="60" placeholder="Ex: Empresa Tech Ltda">
                </div>

                <div class="form-group">
                    <label for="fantasia">Nome Fantasia</label>
                    <input type="text" id="fantasia" name="fantasia" maxlength="100" placeholder="Ex: Tech Manager">
                </div>

                <div class="form-group">
                    <label for="documento">CPF ou CNPJ *</label>
                    <input type="text" id="documento" name="documento" required maxlength="18" placeholder="000.000.000-00" data-mascara="cpf-cnpj">
                </div>

                <div class="form-group full-width">
                    <label for="rua">Rua *</label>
                    <input type="text" id="rua" name="rua" required maxlength="50" placeholder="Ex: Avenida Paulista">
                </div>

                <div class="form-group">
                    <label for="numero">Número *</label>
                    <input type="text" id="numero" name="numero" required maxlength="7" placeholder="Ex: 1000">
                </div>

                <div class="form-group">
                    <label for="bairro">Bairro *</label>
                    <input type="text" id="bairro" name="bairro" required maxlength="50" placeholder="Ex: Bela Vista">
                </div>

                <div class="form-group full-width">
                    <label for="cidade">Cidade *</label>
                    <input type="text" id="cidade" name="cidade" required maxlength="50" placeholder="Ex: São Paulo">
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn">Salvar</button>
                <a href="clientes.html" class="btn btn-secundario btn-cancelar">Cancelar</a>
            </div>
        </form>
    </div>

    <script src="js/cadastro-cliente.js?=v2"></script>
</body>
</html>
