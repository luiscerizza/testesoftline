<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <h2>Acesso ao Sistema</h2>

        <form id="loginForm">
            <div class="form-group">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" name="usuario" required maxlength="32" placeholder="Digite seu usuário">
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required maxlength="255" placeholder="Digite sua senha">
            </div>

            <button type="submit" class="btn">Confirmar</button>

            <p id="mensagemErro" class="error-msg"></p>
        </form>
    </div>

    <script src="js/login.js?v=4"></script>
</body>
</html>
